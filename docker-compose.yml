version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postflow-db
    environment:
      POSTGRES_USER: postflow_user
      POSTGRES_PASSWORD: postflow_pass
      POSTGRES_DB: postflow_db
    ports:
      - "5432:5432"
    volumes:
      - postflow_postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: postflow-api
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://postflow_user:postflow_pass@postgres:5432/postflow_db?schema=public
      - JWT_SECRET=segredo-super-seguro-jwt-2026
      - PORT=4001
    ports:
      - "4001:4001"
    restart: always

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: postflow-web
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: always

volumes:
  postflow_postgres_data:
