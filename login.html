<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialSphere - Entrar no Painel</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Brand header -->
            <div class="brand-header">
                <div class="brand-logo">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <h1>SocialSphere</h1>
                <p>Insira suas credenciais para acessar seus insights</p>
            </div>

            <!-- Error banner -->
            <div class="error-banner" id="error-message" style="display: none;">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="error-text">Credenciais incorretas.</span>
            </div>

            <!-- Login form -->
            <form id="login-form">
                <div class="input-group">
                    <label for="email"><i class="fa-regular fa-envelope"></i> E-mail</label>
                    <input type="email" id="email" placeholder="nome@empresa.com" required>
                </div>

                <div class="input-group">
                    <label for="password"><i class="fa-regular fa-lock"></i> Senha</label>
                    <input type="password" id="password" placeholder="••••••" required>
                </div>

                <button type="submit" class="btn-login" id="btn-submit">
                    <span>Entrar no Painel</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="login-tips">
                <p>💡 <strong>Acesso Rápido para Teste:</strong></p>
                <ul>
                    <li><strong>Gestor (Ver todos):</strong> <code>admin@gestor.com</code> (Senha: <code>123456</code>)</li>
                    <li><strong>Cliente NutriLife:</strong> <code>nutrilife@cliente.com</code> (Senha: <code>123456</code>)</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
